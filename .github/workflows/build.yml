name: SonarCloud Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  sonar:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            project_key: Kuldeep7249_InkWell-API-Gateway
          - service: auth
            project_key: Kuldeep7249_InkWell-Auth-Service
          - service: category
            project_key: Kuldeep7249_InkWell-Category-Service
          - service: commentservice
            project_key: Kuldeep7249_InkWell-Comment-Service
          - service: media
            project_key: Kuldeep7249_InkWell-Media-Service
          - service: notification
            project_key: Kuldeep7249_InkWell-Notification-Service
          - service: post
            project_key: Kuldeep7249_InkWell-Post-Service
          - service: service-registry
            project_key: Kuldeep7249_InkWell-Service-Registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and analyze ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=${{ matrix.project_key }} \
            -Dsonar.organization=kuldeep7249 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN
