server:
  port: 8080

spring:
  application:
    name: auth-service

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest

  datasource:
    url: jdbc:mysql://localhost:3306/InkWell_Database
    username: root
    password: Kuldeep@7249
    driver-class-name: com.mysql.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: your-super-secure-jwt-secret-key-that-is-at-least-32-bytes
    access-expiration-ms: 900000
  rabbitmq:
    notification:
      exchange: notification.exchange
      routing-key: notification.created

services:
  notification:
    url: http://localhost:8087

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
