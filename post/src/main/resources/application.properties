# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/InkWell_Database
spring.datasource.username=root
spring.datasource.password=Kuldeep@7249

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SERVER
# ===============================
server.port=8082
spring.application.name=post-service
app.jwt.secret=your-super-secure-jwt-secret-key-that-is-at-least-32-bytes
services.auth.url=http://localhost:8080
services.category.url=http://localhost:8083
services.notification.url=http://localhost:8087

spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.rabbitmq.notification.exchange=notification.exchange
app.rabbitmq.notification.routing-key=notification.created

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
